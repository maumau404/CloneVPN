<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <section class="container_login">

        <div class="esquerda_login">

            <div class="nav_login">
               <a href="index.html"><img src="assets/login/Frame 5960.png" alt=""></a>
            </div>

            <div class="fundo_login">
                <img src="assets/login/Hand 1.png" alt="">
            </div>

        </div>

        <div class="direita_login">

            <div class="form_login">

                <div class="titulos_login">
                    <h1>Sign In</h1>
                    <h2>Sign Up</h2>
                </div>

                <div class="subtexto_login">
                    <p>Sign in to your registered account</p>
                </div>

                <div class="inputs_login">

                    <form>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder=" Seu e-mail" required>

                        <label for="passaword">Passaword</label>
                        <input type="password" name="passaword" id="passaword" placeholder=" Passaword" required>

                        <div class="botao_login">
                            <button class="botaofinal_login" type="submit">Sign In</button>
                        </div>

                    </form>

                </div>


            </div>

        </div>

    </section>
</body>

</html>
